name: Release macOS DMG

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          CI: true

      - name: Verify app signature
        run: |
          APP_PATH=$(find release -maxdepth 2 -name "MDoCards.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "MDoCards.app not found under release/"
            find release
            exit 1
          fi
          # Electron Framework triggers false positives with --strict; deep verify is enough here.
          codesign --verify --deep --verbose=2 "$APP_PATH"
          codesign -dv --verbose=2 "$APP_PATH"

      - name: Add macOS install notes
        run: |
          cat > release/macOS-install-notes.txt <<'EOF'
          MDoCards macOS 安装说明
          =======================

          本安装包为未公证（notarized）的社区构建。首次打开若提示「已损坏」或「无法验证开发者」，
          并非程序真的损坏，而是 macOS Gatekeeper 对从网络下载的未签名应用的限制。

          解决方法（任选其一）：

          1. 右键 MDoCards.app → 打开 → 在弹窗中再次点「打开」
          2. 终端执行（安装到应用程序文件夹后）：
             xattr -cr /Applications/MDoCards.app
          3. 系统设置 → 隐私与安全性 → 仍要打开

          如需无警告分发，需 Apple 开发者账号进行代码签名与公证。
          EOF

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: MDoCards-mac-dmg
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/macOS-install-notes.txt
          if-no-files-found: error
